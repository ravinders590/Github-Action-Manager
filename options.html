<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Action Manager – Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <svg class="logo" viewBox="0 0 24 24" width="28" height="28">
        <path fill="currentColor"
          d="M12 .5C5.37.5 0 5.78 0 12.292c0 5.211 3.438 9.63 8.205 11.188.6.111.82-.254.82-.567 0-.28-.01-1.022-.015-2.005-3.338.711-4.042-1.582-4.042-1.582-.546-1.361-1.333-1.723-1.333-1.723-1.09-.731.083-.716.083-.716 1.205.082 1.838 1.215 1.838 1.215 1.07 1.803 2.809 1.282 3.495.981.108-.763.417-1.282.76-1.577-2.665-.295-5.466-1.309-5.466-5.827 0-1.287.465-2.339 1.235-3.164-.135-.298-.54-1.497.105-3.121 0 0 1.005-.316 3.3 1.209A11.616 11.616 0 0 1 12 6.32c1.02.005 2.047.136 3.006.398 2.28-1.525 3.285-1.209 3.285-1.209.645 1.624.24 2.823.12 3.121.765.825 1.23 1.877 1.23 3.164 0 4.53-2.805 5.527-5.475 5.817.42.354.81 1.077.81 2.182 0 1.578-.015 2.846-.015 3.229 0 .309.21.678.825.56C20.565 21.917 24 17.495 24 12.292 24 5.78 18.627.5 12 .5z" />
      </svg>
      <div>
        <h1>Settings</h1>
        <p class="subtitle">Configure your GitHub connection and workflow names</p>
      </div>
    </header>

    <form id="settingsForm" autocomplete="off">
      <!-- GitHub Token -->
      <fieldset class="card">
        <legend>Authentication</legend>
        <div class="field">
          <label for="ghToken">Personal Access Token</label>
          <div class="input-group">
            <input id="ghToken" class="input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" spellcheck="false" />
            <button type="button" id="toggleToken" class="icon-btn" title="Show / Hide">
              <svg id="eyeIcon" viewBox="0 0 16 16" width="16" height="16"><path fill="currentColor" d="M8 2c1.981 0 3.671.992 4.933 2.078 1.27 1.091 2.187 2.345 2.637 3.023a1.62 1.62 0 0 1 0 1.798c-.45.678-1.367 1.932-2.637 3.023C11.671 13.008 9.981 14 8 14s-3.671-.992-4.933-2.078C1.797 10.831.88 9.577.43 8.899a1.62 1.62 0 0 1 0-1.798c.45-.678 1.367-1.932 2.637-3.023C4.329 2.992 6.019 2 8 2M1.679 7.932a.12.12 0 0 0 0 .136c.411.622 1.241 1.75 2.366 2.717C5.176 11.758 6.527 12.5 8 12.5s2.824-.742 3.955-1.715c1.124-.967 1.954-2.096 2.366-2.717a.12.12 0 0 0 0-.136c-.412-.621-1.242-1.75-2.366-2.717C10.824 4.242 9.473 3.5 8 3.5s-2.824.742-3.955 1.715c-1.124.967-1.954 2.096-2.366 2.717M8 10a2 2 0 1 1-.001-3.999A2 2 0 0 1 8 10"/></svg>
            </button>
          </div>
          <small class="hint">Requires <code>repo</code> and <code>workflow</code> scopes. <a href="https://github.com/settings/tokens/new?scopes=repo,workflow&description=GitHub+Action+Manager" target="_blank" rel="noopener">Create token</a></small>
        </div>
      </fieldset>

      <!-- Repository -->
      <fieldset class="card" id="repoCard">
        <legend>Repository</legend>

        <!-- fetching indicator -->
        <div id="repoFetchStatus" class="repo-fetch-status hidden"></div>

        <!-- Searchable repo picker -->
        <div class="field" id="repoPickerField">
          <label for="repoSearch">
            Select Repository
            <span id="repoUserPill" class="user-pill hidden"></span>
          </label>
          <div class="repo-picker-wrap">
            <input id="repoSearch" class="input" type="text"
              placeholder="Search repositories or type owner/repo…"
              autocomplete="off" spellcheck="false" />
            <button type="button" id="btnFetchRepos" class="icon-btn repo-fetch-btn" title="Fetch repositories from GitHub">
              <svg viewBox="0 0 16 16" width="15" height="15"><path fill="currentColor" d="M8 2.5a5.487 5.487 0 0 0-4.131 1.869l1.204 1.204A.25.25 0 0 1 4.896 6H1.25A.25.25 0 0 1 1 5.75V2.104a.25.25 0 0 1 .427-.177l1.38 1.38A7.001 7.001 0 0 1 14.95 7.16a.75.75 0 1 1-1.489.18A5.501 5.501 0 0 0 8 2.5M1.705 8.005a.75.75 0 0 1 .834.656 5.501 5.501 0 0 0 9.592 2.97l-1.204-1.204a.25.25 0 0 1 .177-.427h3.646a.25.25 0 0 1 .25.25v3.646a.25.25 0 0 1-.427.177l-1.38-1.38A7.001 7.001 0 0 1 1.05 8.84a.75.75 0 0 1 .656-.834z"/></svg>
            </button>
          </div>
          <ul id="repoDropdown" class="repo-dropdown hidden" role="listbox"></ul>
          <!-- chip shown once a repo is selected -->
          <div id="repoSelectedChip" class="repo-chip hidden">
            <svg viewBox="0 0 16 16" width="13" height="13"><path fill="currentColor" d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8z"/></svg>
            <span id="repoChipLabel"></span>
            <button type="button" id="btnClearRepo" class="chip-clear" title="Clear">
              <svg viewBox="0 0 16 16" width="11" height="11"><path fill="currentColor" d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.749.749 0 0 1 1.06 1.06L9.06 8l3.22 3.22a.749.749 0 0 1-1.06 1.06L8 9.06l-3.22 3.22a.749.749 0 0 1-1.06-1.06L6.94 8 3.72 4.78a.751.751 0 0 1 0-1.06z"/></svg>
            </button>
          </div>
        </div>

        <!-- Hidden backing fields (used by save & test) -->
        <input type="hidden" id="ghOwner" />
        <input type="hidden" id="ghRepo" />
      </fieldset>

      <div class="actions">
        <button type="submit" class="btn btn-primary">
          <svg viewBox="0 0 16 16" width="14" height="14"><path fill="currentColor" d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0"/></svg>
          Save Settings
        </button>
        <button type="button" id="btnTest" class="btn btn-outline">
          <svg viewBox="0 0 16 16" width="14" height="14"><path fill="currentColor" d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0M1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0m4.879-2.773 4.264 2.559a.25.25 0 0 1 0 .428l-4.264 2.559A.25.25 0 0 1 6 10.559V5.442a.25.25 0 0 1 .379-.215"/></svg>
          Test Connection
        </button>
      </div>

      <div id="status" class="status hidden"></div>
    </form>
  </div>

  <script src="options.js"></script>
</body>
</html>
